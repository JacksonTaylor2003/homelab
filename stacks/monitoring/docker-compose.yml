services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    env_file:
      - /opt/homelab/monitoring/.env
    volumes:
      - ${CONFIG_PATH}/prometheus:/prometheus
      - ${CONFIG_PATH}/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${CONFIG_PATH}/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ${CONFIG_PATH}/alertmanager:/alertmanager
      - ${CONFIG_PATH}/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ${CONFIG_PATH}/loki:/loki
      - ${CONFIG_PATH}/loki-config.yml:/etc/loki/local-config.yaml:ro
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - monitoring

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    volumes:
      - ${CONFIG_PATH}/uptime-kuma:/app/data
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring